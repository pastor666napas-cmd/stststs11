<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirect</title>

<style>
body{
  margin:0;
  background:#05070c;
  color:white;
  font-family:Arial;
  height:100vh;
  overflow:hidden;

  display:flex;
  align-items:center;
  justify-content:center;

  transition:0.6s ease;
}

.box{
  text-align:center;
  transform:translateY(0px);
  opacity:1;
  transition:0.6s ease;
}

.loader{
  width:42px;
  height:42px;
  border-radius:50%;
  border:3px solid rgba(255,255,255,0.1);
  border-top:3px solid #00eaff;
  margin:0 auto 20px;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  to{transform:rotate(360deg)}
}

.text{
  font-size:15px;
  opacity:0.8;
  letter-spacing:0.03em;
}

.small{
  font-size:12px;
  opacity:0.5;
  margin-top:8px;
}

.btn{
  margin-top:18px;
  padding:12px 18px;
  border-radius:10px;
  border:1px solid #00eaff;
  background:transparent;
  color:white;
  cursor:pointer;
}

/* эффект "уход вниз" */
.down {
  transform:translateY(80px);
  opacity:0;
  filter:blur(2px);
}
</style>
</head>

<body>

<div class="box" id="box">
  <div class="loader"></div>
  <div class="text">Переход в Telegram...</div>
  <div class="small">Автоматическое перенаправление</div>

  <button class="btn" id="open">Открыть вручную</button>
</div>

<script>
const params = new URLSearchParams(location.search);
const url = params.get("go");

const box = document.getElementById("box");

/* кнопка */
document.getElementById("open").onclick = ()=>{
  if(url) location.href = url;
};

/* 🔥 эффект ухода вниз */
setTimeout(()=>{
  box.classList.add("down");
  window.scrollTo({top:200, behavior:"smooth"});
}, 900);

/* ⚡ переход */
setTimeout(()=>{
  if(url){
    window.location.replace(url);
  }
}, 1900);
</script>

</body>
</html>
