<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>STACHET</title>

<style>
:root{
  --accent:#00eaff;
  --bg:#05070c;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color: transparent;
}

html,body{
  height:100%;
  background:var(--bg);
  overflow-x:hidden;
  font-family:Arial, sans-serif;
  color:white;
}

/* 🌌 BACKGROUND */
#bg3d{
  position:fixed;
  inset:0;
  z-index:0;
}

.grid{
  position:fixed;
  inset:0;
  background:
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size:60px 60px;
  opacity:0.12;
  z-index:1;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 25% 20%, rgba(0,234,255,0.18), transparent 45%),
    radial-gradient(circle at 80% 60%, rgba(255,70,0,0.10), transparent 50%);
  filter:blur(100px);
  z-index:1;
}

/* 🔥 CURSOR (gun + follower restored) */
.cursor{
  position:fixed;
  width:28px;
  height:28px;
  border:2px solid var(--accent);
  border-radius:50%;
  pointer-events:none;
  z-index:9999;
  transform:translate(-50%,-50%);
  box-shadow:0 0 18px rgba(0,234,255,0.5);
}

.cursor::after{
  content:"";
  position:absolute;
  inset:6px;
  border:1px solid rgba(0,234,255,0.6);
  border-radius:50%;
}

.follower{
  position:fixed;
  width:44px;
  height:44px;
  border:1px solid rgba(0,234,255,0.25);
  border-radius:50%;
  pointer-events:none;
  z-index:9998;
  transform:translate(-50%,-50%);
}

/* 📱 hide cursor on mobile */
@media (pointer:coarse){
  .cursor,.follower{display:none;}
}

/* 🧠 LOGO */
.logo-wrap{
  max-width:340px;
  margin:18px auto 10px;
  position:relative;
  z-index:5;
  animation:float 4s ease-in-out infinite;
}

.logo{
  width:100%;
  filter:drop-shadow(0 0 35px rgba(0,234,255,0.35));
  animation:breath 3s ease-in-out infinite;
}

@keyframes breath{
  0%,100%{transform:scale(1); filter:drop-shadow(0 0 25px rgba(0,234,255,0.25));}
  50%{transform:scale(1.03); filter:drop-shadow(0 0 50px rgba(255,70,0,0.25));}
}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-6px)}
}

/* 🌫 smoke overlay (light) */
.smoke{
  position:absolute;
  inset:0;
  opacity:0.25;
  pointer-events:none;
}

/* 🧊 CARDS */
.card{
  margin:10px auto;
  padding:16px;
  max-width:440px;
  width:92vw;

  border-radius:16px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.08);
  backdrop-filter:blur(18px);

  position:relative;
  z-index:5;
}

/* 🔘 BUTTONS */
.btn{
  width:100%;
  padding:16px;
  margin-top:10px;

  border-radius:12px;
  border:1px solid rgba(0,234,255,0.2);

  background:linear-gradient(135deg,
    rgba(0,234,255,0.12),
    rgba(0,0,0,0.2)
  );

  color:white;
  font-weight:600;
  letter-spacing:0.06em;

  cursor:pointer;
  transition:0.2s;
}

.btn:hover{
  transform:scale(1.02);
  box-shadow:0 0 25px rgba(0,234,255,0.12);
}

.btn:active{
  transform:scale(0.98);
}
</style>
</head>

<body>

<canvas id="bg3d"></canvas>
<div class="grid"></div>

<div class="cursor" id="cursor"></div>
<div class="follower" id="follower"></div>

<!-- LOGO -->
<div class="logo-wrap">
  <canvas class="smoke" id="smoke"></canvas>
  <img class="logo" src="logo.png" alt="STACHET">
</div>

<!-- BUTTONS RESTORED -->
<div class="card">
  <button class="btn" onclick="go('https://t.me/speedcoins24bot')">ОБМЕННИК</button>
</div>

<div class="card">
  <button class="btn" onclick="go('https://t.me/admstachet')">ОПЕРАТОР</button>
</div>

<div class="card">
  <button class="btn" onclick="go('https://t.me/stacetbot')">БОТ 1</button>
  <button class="btn" onclick="go('https://t.me/stachet24bot')">БОТ 2</button>
</div>

<div class="card">
  <button class="btn" onclick="go('https://t.me/+TAABznuL11IzYmEy')">ЧАТ</button>
</div>

<div class="card">
  <button class="btn" onclick="go('https://t.me/+ewhxh7eu5Vc3YTA0')">КАНАЛ</button>
</div>

<div class="card">
  <button class="btn" onclick="go('https://telegra.ph/STACHET-CONTACTS-01-15')">КОНТАКТЫ</button>
</div>

<script>
function go(url){
  window.location.href="redirect.html?go="+encodeURIComponent(url);
}

/* 🔥 CURSOR */
const cursor=document.getElementById("cursor");
const follower=document.getElementById("follower");

let mx=0,my=0,fx=0,fy=0;

document.addEventListener("mousemove",(e)=>{
  mx=e.clientX;
  my=e.clientY;
});

function cursorLoop(){
  cursor.style.left=mx+"px";
  cursor.style.top=my+"px";

  fx += (mx - fx) * 0.15;
  fy += (my - fy) * 0.15;

  follower.style.left=fx+"px";
  follower.style.top=fy+"px";

  requestAnimationFrame(cursorLoop);
}
cursorLoop();

/* 🌐 3D LIGHT PARTICLES */
const c=document.getElementById("bg3d");
const ctx=c.getContext("2d");

function resize(){
  c.width=innerWidth;
  c.height=innerHeight;
}
resize();
addEventListener("resize",resize);

const p=Array.from({length:60},()=>({
  x:Math.random()*innerWidth,
  y:Math.random()*innerHeight,
  v:(Math.random()-0.5)*0.4
}));

function draw(){
  ctx.clearRect(0,0,c.width,c.height);

  for(const i of p){
    i.x+=i.v;
    i.y+=i.v;

    if(i.x<0)i.x=innerWidth;
    if(i.y<0)i.y=innerHeight;

    ctx.fillStyle="rgba(0,234,255,0.25)";
    ctx.beginPath();
    ctx.arc(i.x,i.y,2,0,Math.PI*2);
    ctx.fill();
  }

  requestAnimationFrame(draw);
}
draw();

/* 🌫 LOGO SMOKE */
const s=document.getElementById("smoke");
const sctx=s.getContext("2d");

function smokeResize(){
  s.width=340;
  s.height=160;
}
smokeResize();

let t=0;
function smoke(){
  sctx.clearRect(0,0,s.width,s.height);

  for(let i=0;i<12;i++){
    sctx.fillStyle=`rgba(0,234,255,0.05)`;
    sctx.beginPath();
    sctx.arc(170+Math.sin(t+i)*15,80-i*2,25,0,Math.PI*2);
    sctx.fill();
  }

  t+=0.03;
  requestAnimationFrame(smoke);
}
smoke();
</script>

</body>
</html>
